<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4A7C59" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1a2e" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json?v=2">
<title>轻记账</title>
<style>
:root {
  --primary: #4A7C59;
  --primary-light: #6BA37A;
  --primary-dark: #3A6347;
  --bg: #f8f9fa;
  --card: #ffffff;
  --text: #1a1a2e;
  --text2: #6b7280;
  --border: #e5e7eb;
  --danger: #ef4444;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --tab-height: 56px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f23;
    --card: #1a1a2e;
    --text: #e0e0e0;
    --text2: #9ca3af;
    --border: #2d2d44;
    --shadow: 0 1px 3px rgba(0,0,0,0.3);
  }
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);padding-bottom:calc(var(--tab-height)+env(safe-area-inset-bottom));overflow-x:hidden}
.page{display:none;padding:20px 20px 100px;max-width:480px;margin:0 auto;animation:fadeIn .2s}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-title{font-size:26px;font-weight:700;margin-bottom:20px;padding-top:12px}
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:12px}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px}
.input-group input,.input-group select,.input-group textarea{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-size:17px;background:var(--card);color:var(--text);outline:none;transition:border .2s;-webkit-appearance:none;appearance:none}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{border-color:var(--primary)}
.input-group textarea{resize:none;min-height:60px;font-family:inherit}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 20px;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;transition:opacity .15s;gap:6px}
.btn:active{opacity:.7}
.btn-primary{background:var(--primary);color:#fff;width:100%}
.btn-secondary{background:var(--border);color:var(--text);width:100%}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-icon{background:none;border:none;cursor:pointer;padding:4px;color:var(--text2);font-size:18px}
.bottom-tabs{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-height)+env(safe-area-inset-bottom));background:var(--card);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:4px;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 0;cursor:pointer;color:var(--text2);font-size:11px;transition:color .15s;border:none;background:none;-webkit-tap-highlight-color:transparent}
.tab svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tab.active{color:var(--primary);font-weight:600}
.tab.active svg{stroke:var(--primary)}

/* Home page */
.home-summary{display:flex;gap:10px;margin-bottom:16px}
.summary-item{flex:1;background:var(--card);border-radius:var(--radius);padding:14px;text-align:center;box-shadow:var(--shadow)}
.summary-item .num{font-size:28px;font-weight:700;color:var(--primary)}
.summary-item .label{font-size:12px;color:var(--text2);margin-top:2px}

/* List page */
.list-date{font-size:13px;font-weight:600;color:var(--text2);margin:12px 0 6px;padding:0 4px}
.list-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px}
.list-item:last-child{border:none}
.list-item .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.list-item .info{flex:1;min-width:0}
.list-item .info .name{font-size:16px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item .info .meta{font-size:12px;color:var(--text2)}
.list-item .amount{font-size:17px;font-weight:600;white-space:nowrap}
.list-item .actions{display:flex;gap:2px}
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{flex:1;min-width:80px;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-size:15px;background:var(--card);color:var(--text)}

/* Stats page */
.stats-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.chart-container{position:relative;width:100%;display:flex;justify-content:center;padding:4px 0}
#pieChart,#lineChart{max-width:100%;background:var(--card)}
.stats-cat-list{margin-top:12px}
.stats-cat-item{display:flex;align-items:center;padding:6px 0;gap:8px;font-size:13px}
.stats-cat-item .bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.stats-cat-item .bar-fill{height:100%;border-radius:3px;transition:width .3s}
.stats-cat-item .pct{width:40px;text-align:right;color:var(--text2)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:var(--card);border-radius:16px;padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;animation:modalIn .2s}
@keyframes modalIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal h3{font-size:18px;margin-bottom:14px}
.modal .btn-row{display:flex;gap:8px;margin-top:12px}
.modal .btn-row .btn{flex:1}

/* Settings */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border:none}
.setting-row .label{font-size:14px}
/* Skeleton */
.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--card) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.alert-confirm{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.alert-confirm.active{display:flex}
.alert-box{background:var(--card);border-radius:14px;padding:20px;max-width:300px;text-align:center}
.alert-box p{margin-bottom:14px;font-size:15px}
.alert-box .btn-row{display:flex;gap:8px}
.alert-box .btn-row .btn{flex:1}
</style>
</head>
<body>

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="page-title">记账</div>
  <div class="home-summary">
    <div class="summary-item"><div class="num" id="todayCount">0</div><div class="label">今日笔数</div></div>
    <div class="summary-item"><div class="num" id="todayTotal">0.00</div><div class="label">今日支出</div></div>
  </div>
  <div class="card">
    <div class="card-title">记一笔</div>
    <div class="input-group"><label>支出名称</label><input type="text" id="inpName" placeholder="如：午饭"></div>
    <div class="input-group"><label>金额</label><input type="number" id="inpAmount" placeholder="0.00" step="0.01" inputmode="decimal"></div>
    <div class="input-group"><label>分类</label><select id="inpCategory"></select></div>
    <div class="input-group"><label>账户</label><select id="inpAccount"></select></div>
    <div class="input-group"><label>日期</label><input type="date" id="inpDate"></div>
    <button class="btn btn-primary" onclick="addRecord()">保存</button>
  </div>
</div>

<!-- LIST -->
<div class="page" id="page-list">
  <div class="page-title">账单</div>
  <div class="filter-bar">
    <input id="searchInput" placeholder="搜索支出名称" oninput="renderList()">
    <select id="filterCategory" onchange="renderList()"><option value="">全部分类</option></select>
    <select id="filterAccount" onchange="renderList()" style="max-width:110px"><option value="">全部账户</option></select>
    <input type="date" id="filterDateStart" onchange="renderList()" style="max-width:110px;font-size:13px;padding:8px 6px">
    <input type="date" id="filterDateEnd" onchange="renderList()" style="max-width:110px;font-size:13px;padding:8px 6px">
  </div>
  <div id="listContent"></div>
</div>

<!-- STATS -->
<div class="page" id="page-stats">
  <div class="page-title">统计</div>
  <div class="stats-card">
    <div class="card-title">本月支出</div>
    <div style="font-size:28px;font-weight:700;color:var(--primary);margin-bottom:12px" id="monthTotal">0.00</div>
    <div class="chart-container" id="chartContainer"></div>
    <div id="pieLegend" class="stats-cat-list"></div>
  </div>
  <div class="stats-card">
    <div class="card-title">按日趋势</div>
    <div class="chart-container" id="lineContainer"></div>
  </div>
</div>

<!-- ANALYSIS -->
<div class="page" id="page-analysis">
  <div class="page-title">分析</div>
  <div class="card">
    <div class="card-title">按分类查询</div>
    <div class="input-group"><label>分类</label><select id="analysisCategory" onchange="runAnalysis()"></select></div>
    <div style="display:flex;gap:6px">
      <div class="input-group" style="flex:1;min-width:0"><label>开始</label><input type="date" id="analysisDateStart" onchange="runAnalysis()" style="font-size:14px;padding:10px 8px;min-width:0;width:100%"></div>
      <div class="input-group" style="flex:1;min-width:0"><label>结束</label><input type="date" id="analysisDateEnd" onchange="runAnalysis()" style="font-size:14px;padding:10px 8px;min-width:0;width:100%"></div>
    </div>
    <div id="analysisResult" style="margin-top:12px"></div>
  </div>
  <div class="card">
    <div class="card-title">快捷查询</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
      <button class="btn btn-sm btn-secondary" onclick="quickAnalysis('today')" style="flex:1;min-width:70px">今天</button>
      <button class="btn btn-sm btn-secondary" onclick="quickAnalysis('yesterday')" style="flex:1;min-width:70px">昨天</button>
      <button class="btn btn-sm btn-secondary" onclick="quickAnalysis('week')" style="flex:1;min-width:70px">本周</button>
      <button class="btn btn-sm btn-secondary" onclick="quickAnalysis('lastweek')" style="flex:1;min-width:70px">上周</button>
      <button class="btn btn-sm btn-secondary" onclick="quickAnalysis('lastmonth')" style="flex:1;min-width:70px">上月</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="page" id="page-settings">
  <div class="page-title">设置</div>
  <div class="card">
    <div class="setting-row"><span class="label">分类管理</span><button class="btn btn-sm btn-secondary" onclick="showCategoryManager()">管理</button></div>
    <div class="setting-row"><span class="label">导出 CSV</span><button class="btn btn-sm btn-secondary" onclick="exportCSV()">导出</button></div>
    <div class="setting-row"><span class="label">清除全部数据</span><button class="btn btn-sm btn-danger" onclick="confirmClear()">清除</button></div>
  </div>
</div>

<!-- BOTTOM TABS -->
<div class="bottom-tabs">
  <button class="tab active" data-tab="home" onclick="switchTab('home')">
    <svg><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>记账</span>
  </button>
  <button class="tab" data-tab="list" onclick="switchTab('list')">
    <svg><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span>账单</span>
  </button>
  <button class="tab" data-tab="stats" onclick="switchTab('stats')">
    <svg><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
    <span>统计</span>
  </button>
  <button class="tab" data-tab="analysis" onclick="switchTab('analysis')">
    <svg><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span>分析</span>
  </button>
  <button class="tab" data-tab="settings" onclick="switchTab('settings')">
    <svg><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <span>设置</span>
  </button>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 id="modalTitle">编辑</h3>
    <div class="input-group"><label>支出名称</label><input type="text" id="editName"></div>
    <div class="input-group"><label>金额</label><input type="number" id="editAmount" step="0.01"></div>
    <div class="input-group"><label>分类</label><select id="editCategory"></select></div>
    <div class="input-group"><label>账户</label><select id="editAccount"></select></div>
    <div class="input-group"><label>日期</label><input type="date" id="editDate"></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveEdit()">保存</button></div>
  </div>
</div>

<!-- CATEGORY MANAGER MODAL -->
<div class="modal-overlay" id="catModal">
  <div class="modal">
    <h3>分类管理</h3>
    <div id="catList"></div>
    <div class="input-group" style="margin-top:8px"><label>新增分类</label><input type="text" id="newCatName" placeholder="分类名称" style="margin-bottom:6px"><button class="btn btn-primary" onclick="addCategory()">添加</button></div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeCatModal()">完成</button></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-height:80vh;overflow-y:auto">
    <div id="detailContent"></div>
    <div class="btn-row" style="margin-top:12px"><button class="btn btn-secondary" onclick="closeDetail()">关闭</button></div>
  </div>
</div>

<!-- CONFIRM -->
<div class="alert-confirm" id="confirmDialog">
  <div class="alert-box">
    <p id="confirmText">确定删除？</p>
    <div class="btn-row"><button class="btn btn-secondary" onclick="confirmCancel()">取消</button><button class="btn btn-danger" onclick="confirmOk()">确定</button></div>
  </div>
</div>

<script>
// ====== DATA ======
const STORAGE_RECORDS = 'ledger_records';
const STORAGE_CATS = 'ledger_categories';
const DEFAULT_CATS = ['餐饮','App订阅','日用','交通','学习','游戏','娱乐活动','AI','电子产品及配件','家庭开销','人情世故','恋爱支出','医疗健体'];
const DEFAULT_ACCOUNTS = ['微信支付','支付宝','银行卡','亲情卡'];

function getRecords(){return JSON.parse(localStorage.getItem(STORAGE_RECORDS)||'[]')}
function saveRecords(r){localStorage.setItem(STORAGE_RECORDS,JSON.stringify(r))}
function getCategories(){return JSON.parse(localStorage.getItem(STORAGE_CATS)||JSON.stringify(DEFAULT_CATS))}
function saveCategories(c){localStorage.setItem(STORAGE_CATS,JSON.stringify(c))}
function getAccounts(){return JSON.parse(localStorage.getItem('ledger_accounts')||JSON.stringify(DEFAULT_ACCOUNTS))}
function saveAccounts(a){localStorage.setItem('ledger_accounts',JSON.stringify(a))}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function today(){return new Date().toISOString().slice(0,10)}
function now(){const d=new Date();return d.toTimeString().slice(0,5)}

// ====== INIT ======
saveCategories(DEFAULT_CATS);
saveAccounts(DEFAULT_ACCOUNTS);
setTimeout(function(){document.getElementById('inpDate').value=today();},50);
populateCategorySelects();

function populateCategorySelects(){
  const cats=getCategories();
  const accts=getAccounts();
  ['inpCategory','editCategory','filterCategory'].forEach(id=>{
    const sel=document.getElementById(id);
    if(!sel) return;
    if(id==='filterCategory') sel.innerHTML='<option value="">全部分类</option>';
    else sel.innerHTML='';
    cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o)});
  });
  ['inpAccount','editAccount','filterAccount'].forEach(id=>{
    const sel=document.getElementById(id);
    if(!sel) return;
    sel.innerHTML='';
    if(id==='filterAccount'){const o=document.createElement('option');o.value='';o.textContent='全部账户';sel.appendChild(o)}
    accts.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o)});
  });
}

function populateAccountSelects(){}

// ====== TAB SWITCH ======
function switchTab(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelector('.tab[data-tab="'+name+'"]').classList.add('active');
  if(name==='home') refreshHome();
  if(name==='list') renderList();
  if(name==='stats') renderStats();
  if(name==='analysis') initAnalysis()
  if(name==='settings') {}
}

// ====== HOME ======
function refreshHome(){
  const records=getRecords();
  const d=today();
  const todayRecs=records.filter(r=>r.date===d);
  document.getElementById('todayCount').textContent=todayRecs.length;
  document.getElementById('todayTotal').textContent=todayRecs.reduce((s,r)=>s+r.amount,0).toFixed(2);
}

function addRecord(){
  const name=document.getElementById('inpName').value.trim();
  const amount=parseFloat(document.getElementById('inpAmount').value);
  const category=document.getElementById('inpCategory').value;
  const account=document.getElementById('inpAccount').value;
  const date=document.getElementById('inpDate').value;
  const note='';
  if(!name){alert('请输入支出名称');return}
  if(!amount||amount<=0){alert('请输入有效金额');return}
  if(!category){alert('请选择分类');return}
  const records=getRecords();
  records.unshift({id:genId(),name,amount,category,account,date,note,time:now(),type:'expense'});
  saveRecords(records);
  document.getElementById('inpName').value='';
  document.getElementById('inpAmount').value='';

  setTimeout(function(){document.getElementById('inpDate').value=today();},50);
  refreshHome();
  switchTab('list');
}

// ====== LIST ======
function renderList(){
  const records=getRecords();
  const keyword=document.getElementById('searchInput').value.trim().toLowerCase();
  const catFilter=document.getElementById('filterCategory').value;
  const ds=document.getElementById('filterDateStart').value;
  const de=document.getElementById('filterDateEnd').value;
  let filtered=records;
  if(keyword) filtered=filtered.filter(r=>(r.name||'').toLowerCase().includes(keyword));
  if(catFilter) filtered=filtered.filter(r=>r.category===catFilter);
  const acctFilter=document.getElementById('filterAccount').value;
  if(acctFilter) filtered=filtered.filter(r=>r.account===acctFilter);
  if(ds) filtered=filtered.filter(r=>r.date>=ds);
  if(de) filtered=filtered.filter(r=>r.date<=de);
  const grouped={};
  filtered.forEach(r=>{if(!grouped[r.date]) grouped[r.date]=[];grouped[r.date].push(r)});
  const dates=Object.keys(grouped).sort().reverse();
  const colors={};const cats=getCategories();const palette=['#4A7C59','#E8A838','#5B8FA8','#C77D7D','#8FAA7F','#B88CB0','#6BA37A','#D4A574','#7C9EB2','#A8A8A8'];
  cats.forEach((c,i)=>colors[c]=palette[i%palette.length]);
  const container=document.getElementById('listContent');
  if(dates.length===0){container.innerHTML='<div class="card" style="text-align:center;padding:40px;color:var(--text2)">暂无记录</div>';return}
  let html='';
  dates.forEach(d=>{
    html+='<div class="list-date">'+d+'</div>';
    grouped[d].forEach(r=>{
      html+='<div class="list-item"><div class="cat-dot" style="background:'+(colors[r.category]||'#aaa')+'"></div><div class="info"><div class="name">'+(r.name||r.category)+'</div><div class="meta">'+r.category+(r.account?' · '+r.account:'')+' · '+r.time+'</div></div><div class="amount" style="color:'+(r.type==='income'?'var(--primary)':'var(--danger)')+'">'+(r.type==='income'?'+':'-')+r.amount.toFixed(2)+'</div><div class="actions"><button class="btn-icon" onclick="editRecord(\''+r.id+'\')">&#9998;</button><button class="btn-icon" onclick="deleteRecord(\''+r.id+'\')">&#10005;</button></div></div>';
    });
  });
  container.innerHTML=html;
}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ====== CRUD ======
let editingId=null;
function editRecord(id){
  const records=getRecords();const r=records.find(x=>x.id===id);if(!r)return;
  editingId=id;
  document.getElementById('editName').value=r.name||'';
  document.getElementById('editAmount').value=r.amount;
  document.getElementById('editCategory').value=r.category;
  document.getElementById('editAccount').value=r.account;
  document.getElementById('editDate').value=r.date;

  document.getElementById('modalTitle').textContent='编辑账单';
  document.getElementById('editModal').classList.add('active');
}

function saveEdit(){
  const name=document.getElementById('editName').value.trim();

  const account=document.getElementById('editAccount').value;

// ====== STATS ======
function renderStats(){
  const records=getRecords();
  const m=today().slice(0,7);
  const monthRecs=records.filter(r=>r.date.startsWith(m)&&r.type==='expense');
  const total=monthRecs.reduce((s,r)=>s+r.amount,0);
  document.getElementById('monthTotal').textContent=total.toFixed(2);
  renderPie(monthRecs,total);
  renderLine(records,m);
}

function renderPie(records,total){
  const container=document.getElementById('chartContainer');
  if(!container)return;
  if(total===0){container.innerHTML='<div style="text-align:center;color:var(--text2);padding:30px">暂无数据</div>';document.getElementById('pieLegend').innerHTML='';return}
  const catSum={};records.forEach(r=>{catSum[r.category]=(catSum[r.category]||0)+r.amount});
  const entries=Object.entries(catSum).sort((a,b)=>b[1]-a[1]);
  const colors=['#4A7C59','#E8A838','#5B8FA8','#C77D7D','#8FAA7F','#B88CB0','#6BA37A','#D4A574','#7C9EB2','#A8A8A8','#D4A574','#B88CB0','#C77D7D'];
  // Build SVG donut chart
  const cx=120,cy=120,r=85,innerR=50;
  let dashOffset=0;
  const totalCirc=2*Math.PI*r;
  let slices='';
  entries.forEach(([cat,amt],i)=>{
    const pct=amt/total;
    const circ=pct*totalCirc;
    const dash=`${circ} ${totalCirc-circ}`;
    const rotate=-90+pct*180; // rotate so it starts from top
    slices+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+colors[i%colors.length]+'" stroke-width="'+(r-innerR)+'" stroke-dasharray="'+dash+'" stroke-dashoffset="'+( -dashOffset)+'" transform="rotate(-90 '+cx+' '+cy+')" style="transition:stroke-dashoffset 0.3s"/>';
    dashOffset+=circ;
  });
  const svg='<svg width="240" height="240" viewBox="0 0 240 240"><defs><filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter></defs>'+
    slices+
    '<text x="120" y="112" text-anchor="middle" font-size="22" font-weight="700" fill="var(--text)">¥'+total.toFixed(0)+'</text>'+
    '<text x="120" y="134" text-anchor="middle" font-size="13" fill="var(--text2)">本月支出</text>'+
    '</svg>';
  container.innerHTML=svg;
  // Legend
  const legend=document.getElementById('pieLegend');
  legend.innerHTML=entries.map(([cat,amt],i)=>{
    const pct=(amt/total*100).toFixed(1);
    return '<div class="stats-cat-item" onclick="showCategoryDetail(\''+cat+'\')" style="cursor:pointer;padding:8px 6px;border-radius:8px;transition:background 0.15s" onmouseover="this.style.background=\'var(--border)\'" onmouseout="this.style.background=\'transparent\'"><span style="width:12px;height:12px;border-radius:3px;background:'+colors[i%colors.length]+';flex-shrink:0"></span><span style="flex:1;font-size:15px;font-weight:500">'+cat+'</span><span style="font-size:14px;color:var(--text2);width:45px;text-align:right">'+pct+'%</span><span style="font-weight:600;font-size:15px;width:70px;text-align:right">¥'+amt.toFixed(2)+'</span></div>';
  }).join('');
}

function renderLine(records,month){
  const container=document.getElementById('lineContainer');
  if(!container)return;
  // Always show last 7 days (including zero-expense days)
  const todayStr=new Date().toISOString().slice(0,10);
  const d=new Date(todayStr);
  const allDays=[];const dayMap={};
  for(let i=6;i>=0;i--){const cd=new Date(d);cd.setDate(cd.getDate()-i);const s=cd.toISOString().slice(0,10);allDays.push(s);dayMap[s]=0}
  const recs=records.filter(r=>r.date.startsWith(month)&&r.type==='expense');
  recs.forEach(r=>{if(dayMap[r.date]!==undefined)dayMap[r.date]+=r.amount});
  const days=allDays;const vals=days.map(d=>dayMap[d]);
  if(recs.length===0){container.innerHTML='<div style="text-align:center;color:var(--text2);padding:30px">暂无数据</div>';return}
  
  const max=Math.max(...vals,1);
  const w=container.clientWidth||360,h=200;
  const pad={t:20,b:40,l:55,r:20};
  const cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  const xScale=(i)=>pad.l+cw*(i/(Math.max(days.length-1,1)));
  const yScale=(v)=>pad.t+ch*(1-v/max);
  let pts='',area='',dots='',labels='',grid='';
  // Grid + Y axis
  for(let i=0;i<=4;i++){
    const y=yScale(max*i/4);
    grid+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(w-pad.r)+'" y2="'+y+'" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4,4"/>';
    grid+='<text x="'+(pad.l-6)+'" y="'+y+'" text-anchor="end" dominant-baseline="middle" fill="var(--text2)" font-size="11">¥'+(max*(1-i/4)).toFixed(0)+'</text>';
  }
  if(days.length>=2){
    const p=days.map((d,i)=>xScale(i)+','+yScale(vals[i])).join(' ');
    pts='<polyline points="'+p+'" fill="none" stroke="#4A7C59" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#ls)"/>';
    const a='M'+xScale(0)+','+(pad.t+ch)+' '+days.map((d,i)=>xScale(i)+','+yScale(vals[i])).join(' ')+' L'+xScale(days.length-1)+','+(pad.t+ch)+' Z';
    area='<path d="'+a+'" fill="url(#lg)" opacity="0.5"/>';
  }
  days.forEach((d,i)=>{
    const x=xScale(i),y=yScale(vals[i]);
    dots+='<circle cx="'+x+'" cy="'+y+'" r="4" fill="#fff" stroke="#4A7C59" stroke-width="2.5"/>';
    if(days.length<=10||i%Math.ceil(days.length/5)===0||i===days.length-1){
      labels+='<text x="'+x+'" y="'+(pad.t+ch+14)+'" text-anchor="middle" fill="var(--text2)" font-size="11">'+(d.slice(5))+'</text>';
      labels+='<text x="'+x+'" y="'+(y-10)+'" text-anchor="middle" fill="var(--text)" font-size="11" font-weight="600">¥'+vals[i].toFixed(0)+'</text>';
    }
  });
  const svg='<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="display:block;background:var(--card)"><defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4A7C59" stop-opacity="0.15"/><stop offset="100%" stop-color="#4A7C59" stop-opacity="0.01"/></linearGradient><filter id="ls"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#4A7C59" flood-opacity="0.3"/></filter></defs>'+grid+area+pts+dots+labels+'</svg>';
  container.innerHTML=svg;
}function exportCSV(){
  const records=getRecords();
  if(records.length===0){alert('没有数据');return}
  let csv='\ufeff日期,名称,分类,账户,金额,时间\n';
  records.forEach(r=>{csv+=r.date+','+(r.name||'')+','+r.category+','+(r.account||'')+','+r.amount+','+r.time+'\n'});
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='ledger_'+today()+'.csv';a.style.display='none';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},100);
  alert('已导出 '+records.length+' 条数据');
}

// ====== ANALYSIS ======
function initAnalysis(){
  populateAnalysisSelects();
  const d=new Date();
  setTimeout(function(){
    document.getElementById('analysisDateStart').value=toDateStr(d);
    document.getElementById('analysisDateEnd').value=toDateStr(d);
    runAnalysis();
  },50);
}
function populateAnalysisSelects(){
  const sel=document.getElementById('analysisCategory');
  sel.innerHTML='<option value="">全部分类</option>';
  getCategories().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o)});
}
function getDateRange(range){
  const d=new Date();const y=d.getFullYear(),m=d.getMonth(),w=d.getDay();
  const wd=w===0?7:w; // Sunday=7, Monday=1...
  const ranges={
    today:[d,d],
    yesterday:[new Date(y,m,d.getDate()-1),new Date(y,m,d.getDate()-1)],
    week:[new Date(y,m,d.getDate()-wd+1),d],
    lastweek:[new Date(y,m,d.getDate()-wd-6),new Date(y,m,d.getDate()-wd)],
    month:[new Date(y,m,1),d],
    lastmonth:[new Date(y,m-1,1),new Date(y,m,0)]
  };
  return ranges[range]||[d,d];
}
function toDateStr(d){
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}
function quickAnalysis(range){
  const [s,e]=getDateRange(range);
  document.getElementById('analysisDateStart').value=toDateStr(s);
  document.getElementById('analysisDateEnd').value=toDateStr(e);
  runAnalysis();
}
function runAnalysis(){
  const cat=document.getElementById('analysisCategory').value;
  const ds=document.getElementById('analysisDateStart').value;
  const de=document.getElementById('analysisDateEnd').value;
  if(!ds||!de){alert('请选择日期范围');return}
  let records=getRecords().filter(r=>r.type==='expense'&&r.date>=ds&&r.date<=de);
  if(cat) records=records.filter(r=>r.category===cat);
  records.sort((a,b)=>a.ts-b.ts);
  const total=records.reduce((s,r)=>s+r.amount,0);
  const catSum={};records.forEach(r=>{catSum[r.category]=(catSum[r.category]||0)+r.amount});
  const entries=Object.entries(catSum).sort((a,b)=>b[1]-a[1]);
  const days=Math.max(1,Math.ceil((new Date(de)-new Date(ds))/(86400000))+1);
  let html='';
  html+='<div style="display:flex;gap:8px;margin-bottom:10px">';
  html+='<div class="summary-item" style="flex:1"><div class="num" style="font-size:20px">¥'+total.toFixed(2)+'</div><div class="label" style="font-size:11px">合计</div></div>';
  html+='<div class="summary-item" style="flex:1"><div class="num" style="font-size:20px">'+records.length+'</div><div class="label" style="font-size:11px">笔数</div></div>';
  html+='<div class="summary-item" style="flex:1"><div class="num" style="font-size:20px">¥'+(records.length>0?(total/records.length).toFixed(2):'0.00')+'</div><div class="label" style="font-size:11px">笔均</div></div>';
  html+='</div>';
  if(!cat&&entries.length>1){
    html+='<div style="font-size:14px;font-weight:600;margin-bottom:6px;color:var(--text2)">分类分布</div>';
    entries.forEach(([c,a],i)=>{
      const pct=(a/total*100).toFixed(1);
      html+='<div class="stats-cat-item"><span style="width:10px;height:10px;border-radius:2px;background:var(--primary);flex-shrink:0"></span><span style="flex:1;font-size:14px">'+c+'</span><span style="font-size:13px;color:var(--text2)">'+pct+'%</span><span style="font-weight:600;font-size:14px;width:60px;text-align:right">¥'+a.toFixed(2)+'</span></div>';
    });
  }
  if(records.length>0){
    html+='<div style="font-size:14px;font-weight:600;margin:10px 0 6px;color:var(--text2)">明细</div>';
    records.forEach(r=>{
      html+='<div class="list-item"><div class="info"><div class="name">'+(r.name||r.category)+(r.note?' - '+escHtml(r.note):'')+'</div><div class="meta">'+r.date+' · '+r.category+(r.account?' · '+r.account:'')+'</div></div><div class="amount" style="color:var(--danger);font-size:15px">¥'+r.amount.toFixed(2)+'</div></div>';
    });
  }
  if(records.length===0) html+='<div style="text-align:center;padding:20px;color:var(--text2)">该范围内没有记录</div>';
  document.getElementById('analysisResult').innerHTML=html;
}

function showCategoryDetail(cat){
  const records=getRecords().filter(r=>r.category===cat&&r.type==='expense');
  records.sort((a,b)=>b.ts-a.ts);
  const total=records.reduce((s,r)=>s+r.amount,0);
  let html='<div style="font-size:18px;font-weight:700;margin-bottom:4px">'+cat+'</div>';
  html+='<div style="font-size:14px;color:var(--text2);margin-bottom:12px">共'+records.length+'笔 · 合计¥'+total.toFixed(2)+'</div>';
  records.forEach(r=>{
    html+='<div class="list-item"><div class="info"><div class="name">'+(r.name||'')+'</div><div class="meta">'+r.date+' · '+(r.account||'')+'</div></div><div class="amount" style="color:var(--danger)">¥'+r.amount.toFixed(2)+'</div></div>';
  });
  document.getElementById('detailContent').innerHTML=html;
  document.getElementById('detailModal').classList.add('active');
}
